<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- 배경 -->
  <rect width="192" height="192" rx="38" fill="#f8f4ec"/>
  <!-- 골드 테두리 -->
  <rect x="8" y="8" width="176" height="176" rx="32" fill="none" stroke="#8a6a20" stroke-width="2.5" opacity="0.6"/>
  <!-- 내부 장식 테두리 -->
  <rect x="16" y="16" width="160" height="160" rx="26" fill="none" stroke="#8a6a20" stroke-width="1" opacity="0.3"/>

  <!-- 상단 장식 별 -->
  <text x="96" y="44" font-family="serif" font-size="20" fill="#8a6a20" text-anchor="middle" opacity="0.8">✦</text>

  <!-- 메인 텍스트: 해들녘 -->
  <text x="96" y="90" font-family="serif" font-size="34" font-weight="300" fill="#2a1f0a" text-anchor="middle" letter-spacing="4">해들녘</text>

  <!-- 구분선 -->
  <line x1="40" y1="100" x2="152" y2="100" stroke="#8a6a20" stroke-width="0.8" opacity="0.5"/>

  <!-- 서브 텍스트: TAROT -->
  <text x="96" y="122" font-family="Georgia, serif" font-size="16" font-weight="400" fill="#8a6a20" text-anchor="middle" letter-spacing="8">TAROT</text>

  <!-- 하단 장식 -->
  <text x="96" y="152" font-family="serif" font-size="14" fill="#8a6a20" text-anchor="middle" opacity="0.6">✦ ✦ ✦</text>
</svg>
