<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 채팅 카운터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-clear {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-clear:hover {
            background: #e0e0e0;
        }
        
        .result-section {
            margin-top: 30px;
            display: none;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .result-header h3 {
            color: #333;
            font-size: 18px;
        }
        
        .btn-copy {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-copy:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .result-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }
        
        .result-item:hover {
            background: #fff;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .nickname {
            color: #667eea;
            font-weight: 600;
        }
        
        .count {
            color: #764ba2;
            font-weight: 700;
        }
        
        .copy-notice {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .guide {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .guide h4 {
            color: #856404;
            margin-bottom: 10px;
        }
        
        .guide ol {
            color: #856404;
            margin-left: 20px;
        }
        
        .guide li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 유튜브 채팅 카운터</h1>
            <p>채팅 로그를 붙여넣으면 닉네임별 채팅 수를 자동 계산합니다</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <label>📋 유튜브 채팅 로그 붙여넣기</label>
                <textarea id="chatInput" placeholder="Feb 5, 11:48 PM
@해들녘TAROT
👋
Feb 5, 11:46 PM
@5959-ijp8x
토닥~~토닥~꿀잠~주무세요^^
..."></textarea>
                
                <div class="button-group">
                    <button class="btn-analyze" onclick="analyzeChat()">🔍 분석하기</button>
                    <button class="btn-clear" onclick="clearAll()">🗑️ 초기화</button>
                </div>
            </div>
            
            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <h3>📈 분석 결과</h3>
                    <button class="btn-copy" onclick="copyResult()">📋 복사하기</button>
                </div>
                <div class="result-box" id="resultBox"></div>
                
                <div class="guide">
                    <h4>📌 엑셀 붙여넣기 방법</h4>
                    <ol>
                        <li>위의 <strong>"📋 복사하기"</strong> 버튼 클릭</li>
                        <li>엑셀 방송로그 시트의 <strong>B열 (닉네임)</strong> 클릭</li>
                        <li><strong>Ctrl + V</strong> 로 붙여넣기</li>
                        <li>닉네임은 B열, 채팅수는 C열에 자동 분리됨</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>
    
    <div class="copy-notice" id="copyNotice">
        ✅ 복사 완료! 엑셀에 붙여넣으세요
    </div>

    <script>
        function analyzeChat() {
            const input = document.getElementById('chatInput').value;
            
            if (!input.trim()) {
                alert('채팅 로그를 붙여넣어주세요!');
                return;
            }
            
            // @ 다음에 나오는 닉네임 추출 (@ 포함)
            const nicknameRegex = /@([\w가-힣-]+)/g;
            const nicknames = [];
            let match;
            
            while ((match = nicknameRegex.exec(input)) !== null) {
                // @ 기호를 포함하여 저장
                nicknames.push('@' + match[1]);
            }
            
            // 채팅 수 카운트
            const counts = {};
            nicknames.forEach(name => {
                counts[name] = (counts[name] || 0) + 1;
            });
            
            // 채팅 수 많은 순으로 정렬
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            
            // 결과 표시
            displayResult(sorted);
        }
        
        function displayResult(data) {
            const resultBox = document.getElementById('resultBox');
            const resultSection = document.getElementById('resultSection');
            
            if (data.length === 0) {
                alert('닉네임을 찾을 수 없습니다. 형식을 확인해주세요.');
                return;
            }
            
            let html = '';
            data.forEach(([nickname, count]) => {
                html += `
                    <div class="result-item">
                        <span class="nickname">${nickname}</span>
                        <span class="count">${count}</span>
                    </div>
                `;
            });
            
            resultBox.innerHTML = html;
            resultSection.style.display = 'block';
            
            // 결과로 스크롤
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function copyResult() {
            const resultBox = document.getElementById('resultBox');
            const items = resultBox.querySelectorAll('.result-item');
            
            let text = '';
            items.forEach(item => {
                const nickname = item.querySelector('.nickname').textContent;
                const count = item.querySelector('.count').textContent;
                // 탭(\t)으로 구분하여 엑셀에서 자동으로 열 분리되도록 함
                text += `${nickname}\t${count}\n`;
            });
            
            navigator.clipboard.writeText(text).then(() => {
                showCopyNotice();
            });
        }
        
        function showCopyNotice() {
            const notice = document.getElementById('copyNotice');
            notice.style.display = 'block';
            
            setTimeout(() => {
                notice.style.display = 'none';
            }, 2000);
        }
        
        function clearAll() {
            document.getElementById('chatInput').value = '';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
